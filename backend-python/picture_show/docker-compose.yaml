services:

  web:
    build: .
    expose:
      - "8000"

    volumes:
      - .:/app
      - ./data:/app/data
      - ./static:/app/static
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media

    restart: unless-stopped

  nginx:
    image: nginx:latest

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/cert.pem:/etc/nginx/cert.pem
      - ./nginx/key.pem:/etc/nginx/key.pem

      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro

    depends_on:
      - web

    restart: unless-stopped